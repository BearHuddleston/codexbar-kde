name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install --disable-pip-version-check --no-input .
      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v
      - name: Byte-compile
        run: python -m compileall -q src tests scripts

  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quality tools
        run: >-
          python -m pip install --disable-pip-version-check --no-input -e .
          ruff==0.15.20 mypy==2.2.0
      - run: ruff check src tests scripts
      - run: mypy src tests scripts
        env:
          MYPYPATH: src
      - run: git diff --check

  appimage:
    name: Reproducible AppImage (glibc 2.28)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build pinned AppImage
        run: bash scripts/build_appimage.sh
      - name: Save first build
        run: cp dist/CodexBar_KDE-x86_64.AppImage /tmp/first.AppImage
      - name: Rebuild offline
        env:
          APPIMAGE_OFFLINE: 1
        run: bash scripts/build_appimage.sh
      - name: Require byte-identical output
        run: cmp /tmp/first.AppImage dist/CodexBar_KDE-x86_64.AppImage
      - name: Audit final ABI requirements
        run: >-
          python scripts/audit_appimage.py
          dist/CodexBar_KDE-x86_64.AppImage
          --max-glibc 2.28
          --max-glibcxx 3.4.22
          --max-cxxabi 1.3.11
      - name: Smoke-test final AppImage
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          image=dist/CodexBar_KDE-x86_64.AppImage
          "$image" --appimage-extract-and-run --test-render
          printf '%s\n' '#!/bin/sh' \
            "printf '%s\\n' '[{\"provider\":\"codex\",\"usage\":{\"primary\":{\"usedPercent\":12}}}]'" \
            > /tmp/fake-codexbar
          chmod 755 /tmp/fake-codexbar
          "$image" --appimage-extract-and-run --once \
            --codexbar-bin /tmp/fake-codexbar
      - uses: actions/upload-artifact@v4
        with:
          name: CodexBar_KDE-x86_64
          path: dist/CodexBar_KDE-x86_64.AppImage
          if-no-files-found: error
